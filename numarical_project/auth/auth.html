<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign in • Numerical Project</title>
    <link rel="stylesheet" href="./auth.css">
  </head>
  <body>
    <div class="bg">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
    </div>

    <main class="auth-root" aria-live="polite">
      <div style="text-align:center;margin-bottom:10px;display:flex;gap:10px;justify-content:center">
        <a href="../index.html" class="btn-ghost" style="text-decoration:none;font-size:0.85rem">Nonlinear Solver</a>
        <a href="../linear/index.html" class="btn-ghost" style="text-decoration:none;font-size:0.85rem">Linear Solver</a>
        <a href="../analytics/index.html" class="btn-ghost" style="text-decoration:none;font-size:0.85rem">Analytics</a>
      </div>
      <div class="card">
        <div class="brand">
          <h1>Numerical<span>Lab</span></h1>
          <p class="tag">Lightweight auth — local only</p>
        </div>

        <div class="panels">
          <div class="panel login-panel active" id="loginPanel">
            <h2>Welcome back</h2>
            <p>Login to continue to the numerical tools.</p>
            <form id="loginForm" autocomplete="on">
              <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="you@domain.com" required></div>
              <div class="field"><label>Password</label><input id="loginPassword" type="password" placeholder="Enter your password" required></div>
              <button class="btn primary" id="loginBtn" type="submit">Log in</button>
              <div class="muted">Don't have an account? <a href="#" id="showRegister">Create one</a></div>
            </form>
          </div>

          <div class="panel register-panel" id="registerPanel">
            <h2>Create account</h2>
            <p>Register and your credentials remain in your browser (localStorage).</p>
            <form id="registerForm" autocomplete="on">
              <div class="field"><label>Username</label><input id="regUsername" type="text" placeholder="Your display name" required></div>
              <div class="field"><label>Email</label><input id="regEmail" type="email" placeholder="you@domain.com" required></div>
              <div class="field"><label>Password</label><input id="regPassword" type="password" placeholder="Choose a password" required></div>
              <div class="field"><label>Confirm</label><input id="regConfirm" type="password" placeholder="Repeat your password" required></div>
              <button class="btn primary" id="registerBtn" type="submit">Create account</button>
              <div class="muted">Already have an account? <a href="#" id="showLogin">Sign in</a></div>
            </form>
          </div>
        </div>

        <div id="toast" class="toast" aria-hidden="true"></div>
      </div>
    </main>

    <script src="../js/analytics.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
